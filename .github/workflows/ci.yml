name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Licenses and advisories
        uses: EmbarkStudios/cargo-deny-action@v2
      - name: Unit tests (debug, T0)
        run: cargo test --workspace --locked --lib
      - name: Full tests (release + debug assertions, T1)
        run: cargo test --workspace --locked --profile ci

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Full tests (release + debug assertions, T1)
        run: cargo test --workspace --locked --profile ci

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build CLI (for interop tests)
        run: cargo build -p classdiam-cli --release --locked
      - name: Install classdiam + test deps
        run: |
          pip install pytest pandas
          pip install ./crates/py
      - name: pytest
        run: pytest crates/py/tests -v
        env:
          CLASSDIAM_CLI_BIN: ${{ github.workspace }}/target/release/classdiam
