# abi3 wheels for Kaggle (manylinux x86_64) and Windows, attached to
# GitHub releases on v* tags. workflow_dispatch = dry run without a tag.
name: Wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # attach wheels to the GitHub release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2_17" # the Kaggle glibc floor
          - os: windows-latest
            target: x64
            manylinux: auto
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --locked -m crates/py/Cargo.toml --out dist
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9" # oldest supported (abi3-py39)
      - uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest
          path: dist
      - name: Install and smoke test
        run: |
          pip install dist/*.whl
          python -c "import classdiam; r = classdiam.run(n=6, unions=['2']); assert r[0].diameter == 5, r; print('smoke OK', classdiam.__version__)"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
