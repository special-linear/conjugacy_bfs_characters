[graph]
all-features = false

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
]
# malachite (LGPL-3.0) is deliberately NOT allowed here; enabling the optional
# `malachite` feature requires a documented local exception.

[advisories]
yanked = "deny"

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
